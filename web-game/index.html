<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orbit Salvage</title>
  <style>
    :root {
      --ink: #102332;
      --sky-1: #f2f7ff;
      --sky-2: #cde4ff;
      --accent: #ff7a18;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, var(--sky-1), var(--sky-2));
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .shell {
      width: min(96vw, 1080px);
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    #game-canvas {
      width: min(96vw, 960px);
      aspect-ratio: 16 / 9;
      border: 4px solid #1b4f72;
      border-radius: 14px;
      box-shadow: 0 16px 32px rgba(16, 35, 50, 0.28);
      image-rendering: auto;
      background: #1b3040;
      touch-action: none;
    }

    .hint {
      font-size: 13px;
      letter-spacing: 0.02em;
      color: #21465f;
    }
  </style>
</head>
<body>
  <main class="shell">
    <canvas id="game-canvas" width="960" height="540"></canvas>
    <div class="hint">Press <strong>F</strong> for fullscreen. <strong>Esc</strong> exits.</div>
  </main>
  <script src="./game.js"></script>
</body>
</html>
